name: Update ADS Metrics
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies and Chrome
        run: |
          sudo apt-get update
          # Install the specific libraries needed for Chrome
          sudo apt-get install -y libgbm-dev libnss3 libasound2t64
          
          # Install Python tools
          pip install requests-html pyppeteer
          
          # Use the direct path to install the browser to avoid "No module named" error
          python -m pyppeteer.command_install

      - name: Run scraper
        run: python update_metrics.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add metrics.json
          git commit -m "Update ADS metrics" || exit 0
          git push
