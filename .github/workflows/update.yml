name: Update ADS Metrics
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # These specific libraries are required to prevent Exit Code 100
          sudo apt-get install -y \
            libgbm-dev \
            libnss3 \
            libasound2 \
            libxshmfence1 \
            libglu1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxi6 \
            libxtst6 \
            libpangocairo-1.0-0 \
            libpango-1.0-0 \
            libatk1.0-0 \
            libcairo-gobject2 \
            libcairo2 \
            libgdk-pixbuf2.0-0 \
            libglib2.0-0 \
            libgtk-3-0
          
          pip install requests-html
          # Downloads the browser
          python -m pyppeteer-install 

      - name: Run scraper
        run: python update_metrics.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add metrics.json
          git commit -m "Update ADS metrics" || exit 0
          git push
