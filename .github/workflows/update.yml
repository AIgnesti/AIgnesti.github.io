name: Update ADS Metrics
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Fixes the Node.js 24 requirement mentioned in your error
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Updated from v3 to v4
      - name: Checkout repo
        uses: actions/checkout@v4

      # Updated from v3 to v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Browser Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget unzip
          python -m pyppeteer-install 

      - name: Install Python Packages
        run: pip install requests-html

      - name: Run scraper
        run: python update_metrics.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add metrics.json
          git commit -m "Update ADS metrics" || exit 0
          git push
