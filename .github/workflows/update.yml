name: Update ADS Metrics
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# We remove the FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 env var 
# because v5/v6 actions are native to the newer Node environments.

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Use v4 (latest stable) or check if v5 is available for your runner
      - name: Checkout repo
        uses: actions/checkout@v4

      # Upgrade to v5, which supports Node 20/24 smoothly
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
         # cache: 'pip' # Optional: speeds up subsequent runs

      - name: Install Browser Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget unzip
          python -m pyppeteer-install 

      - name: Install Python Packages
        run: pip install requests-html

      - name: Run scraper
        run: python update_metrics.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add metrics.json
          git commit -m "Update ADS metrics" || exit 0
          git push
